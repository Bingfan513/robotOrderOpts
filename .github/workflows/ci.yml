name: Robot Order System CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}
      
      - name: Run tests
        run: bash script/test.sh
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-go-${{ matrix.go-version }}
          path: result.txt

  build:
    name: Build CLI
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      
      - name: Build application
        run: bash script/build.sh
      
      - name: Verify executable
        run: |
          if [ -f robot-order-system ]; then
            echo "✅ Build successful"
            ./robot-order-system --version 2>/dev/null || echo "ℹ️ No version flag"
          else
            echo "❌ Build failed"
            exit 1
          fi
      
      - name: Upload executable
        uses: actions/upload-artifact@v3
        with:
          name: robot-order-system-executable
          path: robot-order-system

  run:
    name: Run CLI Application
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      
      - name: Run application
        run: bash script/run.sh
      
      - name: Display results
        run: |
          echo "╔════════════════════════════════════════╗"
          echo "║          Application Results           ║"
          echo "╚════════════════════════════════════════╝"
          cat result.txt
      
      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: application-results
          path: result.txt
      
      - name: Verify timestamp format
        run: |
          if grep -q '\[[0-9][0-9]:[0-9][0-9]:[0-9][0-9]\]' result.txt; then
            echo "✅ Timestamp format verified (HH:MM:SS)"
          else
            echo "⚠️ Timestamp format not found in expected format"
          fi

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m
        continue-on-error: true
      
      - name: Check code formatting
        run: |
          if ! go fmt ./...; then
            echo "⚠️ Code formatting issues found"
          fi
      
      - name: Run vet
        run: go vet ./...
        continue-on-error: true

  go-verify-result:
    name: Verify Application Results
    runs-on: ubuntu-latest
    needs: run
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download application results
        uses: actions/download-artifact@v3
        with:
          name: application-results
      
      - name: Verify result.txt exists
        run: |
          if [ ! -f result.txt ]; then
            echo "❌ result.txt not found"
            exit 1
          fi
          echo "✅ result.txt exists"
      
      - name: Verify result.txt has content
        run: |
          if [ ! -s result.txt ]; then
            echo "❌ result.txt is empty"
            exit 1
          fi
          echo "✅ result.txt has content"
          wc -l result.txt
      
      - name: Verify timestamps in output
        run: |
          if grep -q '\[[0-9][0-9]:[0-9][0-9]:[0-9][0-9]\]' result.txt; then
            echo "✅ Valid timestamp format detected (HH:MM:SS)"
            grep '\[[0-9][0-9]:[0-9][0-9]:[0-9][0-9]\]' result.txt | head -5
          else
            echo "❌ No valid timestamps found in expected format [HH:MM:SS]"
            exit 1
          fi
      
      - name: Verify meaningful output
        run: |
          if grep -q "✅\|✨\|订单\|机器人" result.txt; then
            echo "✅ Meaningful application output detected"
            head -20 result.txt
          else
            echo "⚠️ Warning: Expected application output not found"
          fi
      
      - name: Display final verification report
        run: |
          echo "╔════════════════════════════════════════╗"
          echo "║      Verification Report               ║"
          echo "╚════════════════════════════════════════╝"
          echo
          echo "📄 File: result.txt"
          echo "📊 Lines: $(wc -l < result.txt)"
          echo "📦 Size: $(du -h result.txt | cut -f1)"
          echo
          echo "🔍 Timestamp samples:"
          grep -o '\[[0-9][0-9]:[0-9][0-9]:[0-9][0-9]\]' result.txt | sort | uniq | head -10
          echo
          echo "✅ go-verify-result: PASSED"
